[build]
  base    = "tijolo"
  publish = "public"

[functions]
  directory = "../netlify/functions"

[[redirects]]
  from   = "/api/waitlist"
  to     = "/.netlify/functions/waitlist"
  status = 200

[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

[[plugins]]
  package = "@netlify/plugin-functions-install-core"
  