<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Tijolo</title>
    <style>
        body {
            background-color: #ffffff;
            color: #000000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
            margin: 0;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        #total-count {
            font-size: 16px;
            color: #666;
            margin-bottom: 32px;
        }
        table {
            width: 100%;
            max-width: 800px;
            border-collapse: collapse;
            text-align: left;
        }
        th, td {
            padding: 12px 16px;
            border-bottom: 1px solid #eaeaea;
        }
        th {
            font-weight: 500;
            color: #666;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        td {
            font-size: 15px;
        }
        #error-msg {
            color: red;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Admins do Tijolo</h1>
    <div id="total-count">Total de Inscritos: Carregando...</div>
    
    <table id="waitlist-table">
        <thead>
            <tr>
                <th>E-mail</th>
                <th>Data de Inscrição</th>
            </tr>
        </thead>
        <tbody>
            <!-- Preenchido via JS -->
        </tbody>
    </table>
    <div id="error-msg"></div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const password = prompt("Digite a senha de administrador:");
            if (!password) {
                document.getElementById('error-msg').innerText = "Acesso negado.";
                document.getElementById('total-count').innerText = "";
                return;
            }

            try {
                const response = await fetch(`/api/admin/waitlist?password=${encodeURIComponent(password)}`);
                const data = await response.json();

                if (response.ok && data.success) {
                    const tbody = document.querySelector('#waitlist-table tbody');
                    document.getElementById('total-count').innerText = `Total de Inscritos: ${data.users.length}`;
                    
                    if (data.users.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="2" style="text-align: center; color: #666;">Nenhum usuário na lista de espera.</td></tr>';
                    } else {
                        data.users.forEach(user => {
                            const tr = document.createElement('tr');
                            const tdEmail = document.createElement('td');
                            tdEmail.textContent = user.email;
                            const tdDate = document.createElement('td');
                            
                            // Ajustar data
                            let dateStr = "Sem data";
                            if (user.created_at) {
                                // Assume que o banco retorna a data em UTC
                                const dateObj = new Date(user.created_at + "Z");
                                if (!isNaN(dateObj.getTime())) {
                                    dateStr = dateObj.toLocaleString('pt-BR');
                                } else {
                                    dateStr = user.created_at;
                                }
                            }
                            tdDate.textContent = dateStr;
                            
                            tr.appendChild(tdEmail);
                            tr.appendChild(tdDate);
                            tbody.appendChild(tr);
                        });
                    }
                } else {
                    document.getElementById('error-msg').innerText = data.message || "Senha incorreta ou erro de acesso.";
                    document.getElementById('total-count').innerText = "";
                }
            } catch (error) {
                console.error("Erro ao buscar dados:", error);
                document.getElementById('error-msg').innerText = "Erro ao conectar com o servidor.";
                document.getElementById('total-count').innerText = "";
            }
        });
    </script>
</body>
</html>
